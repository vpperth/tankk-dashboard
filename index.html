<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tankk Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
:root{--bg:#0f172a;--panel:#111827;--border:#243041;--text:#e5e7eb;--muted:#94a3b8;--orange:#f97316;--orange2:#fb923c;--green:#22c55e;--red:#ef4444;--blue:#38bdf8;--yellow:#facc15}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:40px}
.landing h1{font-size:2.5rem;background:linear-gradient(90deg,var(--orange),var(--orange2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.landing p{color:var(--muted);font-size:1.1rem}
.landing-btns{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.btn-land{padding:24px 48px;border-radius:16px;font-size:1.2rem;font-weight:800;cursor:pointer;border:none;transition:transform .2s,box-shadow .2s}
.btn-land.owner{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff}
.btn-land.staff{background:var(--panel);color:var(--text);border:2px solid var(--border)}
.btn-land:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
.screen{display:none;min-height:100vh}.screen.active{display:block}
.topbar{display:flex;align-items:center;gap:16px;padding:16px 24px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.back-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:700}
.topbar h2{flex:1;font-size:1.1rem;color:var(--muted)}
.live{background:rgba(34,197,94,.15);color:var(--green);padding:4px 12px;border-radius:999px;font-size:.8rem;font-weight:700}
.container{max-width:1200px;margin:0 auto;padding:24px}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.summary-2col{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:20px}
.portal-2col{display:grid;grid-template-columns:1fr 1.4fr;gap:18px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.eyebrow{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:8px}
.metric{font-size:1.8rem;font-weight:800;margin-bottom:4px}
.small{color:var(--muted);font-size:.85rem}
.progress{height:6px;background:#182133;border-radius:999px;overflow:hidden;margin-top:10px}
.progress>div{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));border-radius:999px}
.tag{display:inline-block;padding:4px 10px;border-radius:999px;font-size:.75rem;font-weight:700}
.good{background:rgba(34,197,94,.14);color:var(--green)}.bad{background:rgba(239,68,68,.14);color:var(--red)}.warn{background:rgba(250,204,21,.12);color:var(--yellow)}.blue{background:rgba(56,189,248,.14);color:var(--blue)}
.alert-list{display:flex;flex-direction:column;gap:10px}
.alert{padding:12px 14px;border-radius:10px;font-size:.9rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.alert-red{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08)}.alert-green{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08)}.alert-yellow{border-color:rgba(250,204,21,.3);background:rgba(250,204,21,.08)}
.alert-meta{font-size:.75rem;color:var(--muted);margin-top:4px}
.store-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.store-row:last-child{border-bottom:none}.store-name{font-weight:800;min-width:80px}
.store-bars{flex:1;display:flex;flex-direction:column;gap:4px}
.store-bar{height:8px;background:#182133;border-radius:4px;overflow:hidden}.store-bar-fill{height:100%;border-radius:4px}
.store-w .store-bar-fill{background:var(--orange)}.store-m .store-bar-fill{background:var(--blue)}
.store-nums{display:flex;gap:16px;font-size:.85rem;color:var(--muted);min-width:160px}.store-nums strong{color:var(--text)}
.notes-feed{display:flex;flex-direction:column;gap:10px}
.note{padding:12px 14px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.note-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-store{font-weight:800;font-size:.85rem}.note-shift{font-size:.75rem;color:var(--muted)}
.note-body{font-size:.9rem;color:#c0c5cf}.note-time{font-size:.75rem;color:var(--muted);margin-top:4px}
.form-group{margin-bottom:14px}
label{display:block;margin-bottom:6px;color:var(--muted);font-size:.85rem;font-weight:600}
input,select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text);font:inherit;font-size:.95rem}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.15)}
textarea{min-height:80px;resize:vertical}
.checklist{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.check-item{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;cursor:pointer}
.check-item input[type=checkbox]{width:auto;margin-top:2px;accent-color:var(--orange)}
.check-item span{flex:1;font-size:.9rem;line-height:1.4}
.check-item.done span{text-decoration:line-through;color:var(--muted)}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{padding:12px 20px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;font-weight:700;font-size:.95rem}
.btn.primary{background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#fff}
.btn.full{width:100%;text-align:center}
canvas{max-height:260px}
@media(max-width:900px){.summary-2col,.portal-2col{grid-template-columns:1fr}.hero-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.hero-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<div id="screen-landing" class="screen active">
  <div class="landing">
    <h1>Tankk Dashboard</h1>
    <p>Winthrop & Melville</p>
    <div class="landing-btns">
      <button class="btn-land owner" onclick="showScreen('owner')">Owner Dashboard</button>
      <button class="btn-land staff" onclick="showScreen('staff')">Staff Portal</button>
    </div>
  </div>
</div>
<div id="screen-owner" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('landing')">Back</button>
    <h2>Owner Dashboard</h2>
    <span class="live">LIVE</span>
  </div>
  <div class="container">
    <div class="hero-grid" id="owner-kpis"></div>
    <div class="summary-2col">
      <div class="card"><div class="eyebrow">Daily Sales - This Week</div><canvas id="salesChart"></canvas></div>
      <div class="card"><div class="eyebrow">Alerts & Issues</div><div class="alert-list" id="alerts"></div></div>
    </div>
    <div class="card" style="margin-bottom:20px"><div class="eyebrow">Store Performance vs Targets</div><div id="store-rows"></div></div>
    <div class="card"><div class="eyebrow">Staff Notes / Handovers</div><div class="notes-feed" id="notes-feed"></div></div>
  </div>
</div>
<div id="screen-staff" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('landing')">Back</button>
    <h2>Staff Portal</h2>
  </div>
  <div class="container">
    <div class="portal-2col">
      <div class="card">
        <div class="eyebrow">Shift Setup</div>
        <div class="form-group"><label>Store</label><select id="staffStore"><option value="winthrop">Winthrop</option><option value="melville">Melville</option></select></div>
        <div class="form-group"><label>Your Name</label><input id="staffName" placeholder="Enter your name" /></div>
        <div class="form-group"><label>Shift Type</label><select id="staffShiftType" onchange="onShiftTypeChange()"><option value="open">Open Shift</option><option value="close">Close Shift</option><option value="stocktake">Stock Take</option><option value="adjustment">Stock Adjustment</option></select></div>
        <div class="form-group"><label>Handover Notes</label><textarea id="staffNotes" placeholder="Problems, shortages, feedback..."></textarea></div>
        <button class="btn primary full" onclick="startShift()">Start Shift</button>
      </div>
      <div class="card">
        <div class="eyebrow" id="portal-eyebrow">Select shift type and start</div>
        <div id="portal-body"><p style="color:var(--muted);font-size:.9rem;margin-top:8px">Choose your shift type on the left, enter your name, then click Start Shift.</p></div>
      </div>
    </div>
  </div>
</div>

<script>

var TARGETS = { winthrop: 15000, melville: 13500, all: 28500 };
var salesWeek = { winthrop: { kounta: 10200, uber: 2650, total: 12850, customers: 445 }, melville: { kounta: 8950, uber: 2570, total: 11520, customers: 385 }};
var dailySales = [
  { date:"Mon 23", winthrop:1350, melville:1130 },
  { date:"Tue 24", winthrop:2371, melville:2001 },
  { date:"Wed 25", winthrop:2060, melville:1761 },
  { date:"Thu 26", winthrop:2340, melville:2136 },
  { date:"Fri 27", winthrop:2550, melville:2275 },
  { date:"Sat 28", winthrop:2971, melville:2580 },
  { date:"Sun 29", winthrop:3380, melville:2991 },
];
var alerts = [
  { type:"yellow", text:"Melville close - 1 incomplete submission Mon night", time:"2 days ago" },
  { type:"red", text:"Stock variance: Chicken fillet - expected 40, counted 28", time:"3 days ago" },
  { type:"green", text:"Both stores completed Easter special setup on time", time:"4 days ago" },
];
var recentNotes = [
  { store:"Winthrop", shift:"Close", name:"Jake", body:"Fish count done. Battery low on tablet 2.", time:"Yesterday 8:45 PM" },
  { store:"Melville", shift:"Open", name:"Sarah", body:"Fryer temp fine. Ran out of lemons - ordered more.", time:"Yesterday 4:20 PM" },
  { store:"Winthrop", shift:"Close", name:"Mike", body:"UE wrong orders - customer refunded.", time:"2 days ago" },
];
var CHECKLISTS = {
  winthrop:{
    open:["Bring out flag","Set up tables/chairs","Turn on power / lights / fume hood","Turn on fryers and grill at 4:00pm","Set up fish fridge","Check dates in fridges","Set up taco fridge","Ensure tablets online","Test phone","Feed fish","Cut lemons","Make batter","Open at 4:30pm","Test fryer temperatures"],
    close:["Text Paul rundown","Fish count for next day","Lock front door","Turn off fryers and grill","Check fridges/freezers shut","Cash count and takings","POS back to home page","Drain dishwasher","Check Bopple backend","Text Paul photos for hake & salads","Phone on charge","Alarm on","Lock back door and return key"],
  },
  melville:{
    open:["Set up tables/chairs","Turn on lights","Turn on fryers and grill at 4:00pm","Set up fish fridge","Check dates in fridges","Set up taco fridge","Ensure tablets online","Test phone","Cut lemons","Make batter","Open at 4:30pm","Test fryer temperatures"],
    close:["Text Paul rundown","Fish count for next day","Lock front door","Turn off fryers and grill","Check fridges/freezers shut","Cash count and takings","POS back to home page","Drain dishwasher","Check Bopple backend","Text Paul photos for hake & salads","Phone on charge","Alarm on","Lock back door and return key"],
  },
};
var salesChart = null;
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById("screen-" + name).classList.add("active");
  if (name === "owner") renderOwner();
  if (name === "staff") resetStaff();
}
function renderOwner() {
  var combined = salesWeek.winthrop.total + salesWeek.melville.total;
  var target = TARGETS.all;
  var ach = Math.round((combined / target) * 100);
  var gap = target - combined;
  var aov = Math.round(combined / (salesWeek.winthrop.customers + salesWeek.melville.customers));
  var uberMix = Math.round(((salesWeek.winthrop.uber + salesWeek.melville.uber) / combined) * 100);
  var wAch = Math.round((salesWeek.winthrop.total / TARGETS.winthrop) * 100);
  var mAch = Math.round((salesWeek.melville.total / TARGETS.melville) * 100);
  function kpi(label, value, sub, pct) {
    return '<div class="card"><div class="eyebrow">' + label + '</div><div class="metric">' + value + '</div><div class="small">' + sub + '</div>' + (pct !== undefined ? '<div class="progress"><div style="width:' + Math.min(pct,100) + '%"></div></div>' : '') + '</div>';
  }
  document.getElementById("owner-kpis").innerHTML =
    kpi("Weekly Sales", "$" + combined.toLocaleString(), "Combined this week") +
    kpi("Achievement", ach + "%", "of $28,500 target", ach) +
    kpi("Weekly Gap", "$" + gap.toLocaleString(), ach >= 100 ? "On target" : "Below target", ach) +
    kpi("AOV", "$" + aov, "Per customer") +
    kpi("Uber Mix", uberMix + "%", "of weekly revenue") +
    kpi("Customers", (salesWeek.winthrop.customers + salesWeek.melville.customers).toLocaleString(), "This week");
  renderSalesChart();
  renderAlerts();
  renderStoreRows(wAch, mAch);
  renderNotes();
}
function renderSalesChart() {
  var ctx = document.getElementById("salesChart").getContext("2d");
  if (salesChart) salesChart.destroy();
  salesChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: dailySales.map(function(d){ return d.date; }),
      datasets: [
        { label: "Winthrop", data: dailySales.map(function(d){ return d.winthrop; }), backgroundColor: "rgba(249,115,22,0.8)", borderRadius: 4 },
        { label: "Melville", data: dailySales.map(function(d){ return d.melville; }), backgroundColor: "rgba(56,189,248,0.8)", borderRadius: 4 },
      ]
    },
    options: { responsive: true, plugins: { legend: { labels: { color: "#94a3b8" } } }, scales: { x: { ticks: { color: "#94a3b8" }, grid: { display: false } }, y: { ticks: { color: "#94a3b8" }, grid: { color: "rgba(255,255,255,0.05)" } } } }
  });
}
function renderAlerts() {
  var el = document.getElementById("alerts");
  if (!alerts || alerts.length === 0) { el.innerHTML = '<p style="color:var(--muted);font-size:.9rem">No alerts. All good.</p>'; return; }
  el.innerHTML = alerts.map(function(a) {
    return '<div class="alert alert-' + a.type + '">' + a.text + '<div class="alert-meta">' + a.time + '</div></div>';
  }).join('');
}
function renderStoreRows(wAch, mAch) {
  var el = document.getElementById("store-rows");
  function storeRow(name, cls, total, target, ach) {
    var pct = Math.round((total / target) * 100);
    return '<div class="store-row ' + cls + '">' +
      '<div class="store-name">' + name + '</div>' +
      '<div class="store-bars">' +
        '<div class="store-bar"><div class="store-bar-fill" style="width:' + Math.min(pct,100) + '%"></div></div>' +
        '<div style="font-size:.75rem;color:var(--muted)">$' + total.toLocaleString() + ' / $' + target.toLocaleString() + '   ' + ach + '%</div>' +
      '</div>' +
    '</div>';
  }
  el.innerHTML = storeRow("Winthrop", "store-w", salesWeek.winthrop.total, TARGETS.winthrop, wAch) +
                 storeRow("Melville", "store-m", salesWeek.melville.total, TARGETS.melville, mAch);
}
function renderNotes() {
  var el = document.getElementById("notes-feed");
  if (!recentNotes || recentNotes.length === 0) { el.innerHTML = '<p style="color:var(--muted);font-size:.9rem">No notes yet.</p>'; return; }
  el.innerHTML = recentNotes.map(function(n) {
    return '<div class="note">' +
      '<div class="note-header">' +
        '<span class="note-store">' + n.store + '</span>' +
        '<span class="note-shift tag warn">' + n.shift + '</span>' +
      '</div>' +
      '<div class="note-body">' + n.name + ': ' + n.body + '</div>' +
      '<div class="note-time">' + n.time + '</div>' +
    '</div>';
  }).join('');
}
function onShiftTypeChange() {
  var t = document.getElementById("staffShiftType").value;
  if (t === "stocktake") {
    document.getElementById("portal-eyebrow").textContent = "Stock Take";
    document.getElementById("portal-body").innerHTML = '<div class="form-group"><label>Item name</label><input id="stockItem" placeholder="e.g. Chicken fillet" /></div><div class="form-group"><label>Expected qty</label><input id="stockExpected" type="number" placeholder="Expected" /></div><div class="form-group"><label>Counted qty</label><input id="stockCounted" type="number" placeholder="Counted" /></div><div class="form-group"><label>Notes</label><textarea id="stockNotes" placeholder="Variance reason..."></textarea></div><button class="btn primary full" onclick="submitStockTake()">Submit Stock Take</button>';
  } else if (t === "adjustment") {
    document.getElementById("portal-eyebrow").textContent = "Stock Adjustment";
    document.getElementById("portal-body").innerHTML = '<div class="form-group"><label>Item name</label><input id="adjItem" placeholder="e.g. Chicken fillet" /></div><div class="form-group"><label>Adjustment qty (+/-)</label><input id="adjQty" type="number" placeholder="+ or -" /></div><div class="form-group"><label>Reason</label><select id="adjReason"><option>wastage</option><option>spoilage</option><option>damaged</option><option>wrong count</option><option>transfer</option><option>manager adjustment</option></select></div><div class="form-group"><label>Notes</label><textarea id="adjNotes" placeholder="Reason..."></textarea></div><button class="btn primary full" onclick="submitAdjustment()">Submit Adjustment</button>';
  } else {
    document.getElementById("portal-eyebrow").textContent = "Select shift type and start";
    document.getElementById("portal-body").innerHTML = '<p style="color:var(--muted);font-size:.9rem;margin-top:8px">Choose your shift type on the left, enter your name, then click Start Shift.</p>';
  }
}
function resetStaff() {
  document.getElementById("staffName").value = "";
  document.getElementById("staffNotes").value = "";
  document.getElementById("staffShiftType").value = "open";
  document.getElementById("staffStore").value = "winthrop";
  document.getElementById("portal-eyebrow").textContent = "Select shift type and start";
  document.getElementById("portal-body").innerHTML = '<p style="color:var(--muted);font-size:.9rem;margin-top:8px">Choose your shift type on the left, enter your name, then click Start Shift.</p>';
}
function startShift() {
  var name = document.getElementById("staffName").value.trim();
  if (!name) { alert("Please enter your name first."); return; }
  var store = document.getElementById("staffStore").value;
  var shift = document.getElementById("staffShiftType").value;
  var notes = document.getElementById("staffNotes").value.trim();
  var list = CHECKLISTS[store][shift];
  if (!list) return;
  document.getElementById("portal-eyebrow").textContent = (shift === "open" ? "Open" : "Close") + " Checklist - " + store;
  var html = '<div class="checklist">' + list.map(function(item, i) {
    return '<label class="check-item" onclick="this.classList.toggle(\'done\')"><input type="checkbox" /> <span>' + item + '</span></label>';
  }).join('') + '</div>';
  html += '<div class="form-group" style="margin-top:14px"><label>Notes</label><textarea id="shiftNotes" placeholder="Add any notes...">' + (notes || '') + '</textarea></div>';
  html += '<div class="btn-row"><button class="btn primary" onclick="submitShift()">Submit & Done</button></div>';
  document.getElementById("portal-body").innerHTML = html;
}
function submitShift() {
  var store = document.getElementById("staffStore").value;
  var name = document.getElementById("staffName").value.trim();
  var shift = document.getElementById("staffShiftType").value;
  var checks = document.querySelectorAll("#portal-body input[type=checkbox]");
  var completed = 0;
  checks.forEach(function(c){ if(c.checked) completed++; });
  var total = checks.length;
  var pct = Math.round((completed / total) * 100);
  var notes = (document.getElementById("shiftNotes") || {}).value || "";
  var sub = { staff: name, store: store, shift: shift, completed: completed, total: total, pct: pct, notes: notes, time: new Date().toISOString() };
  console.log("SHIFT SUBMITTED:", JSON.stringify(sub));
  localStorage.setItem("tankk_last_submission", JSON.stringify(sub));
  alert("Submitted! " + pct + "% complete (" + completed + "/" + total + "). Thank you!");
  resetStaff();
}
function submitStockTake() {
  var item = document.getElementById("stockItem").value.trim();
  var expected = document.getElementById("stockExpected").value;
  var counted = document.getElementById("stockCounted").value;
  var notes = document.getElementById("stockNotes").value.trim();
  if (!item || !expected || !counted) { alert("Please fill all fields."); return; }
  var sub = { type: "stocktake", staff: document.getElementById("staffName").value.trim() || "Unknown", store: document.getElementById("staffStore").value, item: item, expected: expected, counted: counted, notes: notes, time: new Date().toISOString() };
  console.log("STOCK TAKE:", JSON.stringify(sub));
  localStorage.setItem("tankk_last_submission", JSON.stringify(sub));
  alert("Stock take submitted! " + counted + "/" + expected + " counted.");
  resetStaff();
}
function submitAdjustment() {
  var item = document.getElementById("adjItem").value.trim();
  var qty = document.getElementById("adjQty").value;
  var reason = document.getElementById("adjReason").value;
  var notes = document.getElementById("adjNotes").value.trim();
  if (!item || !qty) { alert("Please fill all fields."); return; }
  var sub = { type: "adjustment", staff: document.getElementById("staffName").value.trim() || "Unknown", store: document.getElementById("staffStore").value, item: item, qty: qty, reason: reason, notes: notes, time: new Date().toISOString() };
  console.log("STOCK ADJUSTMENT:", JSON.stringify(sub));
  localStorage.setItem("tankk_last_submission", JSON.stringify(sub));
  alert("Adjustment submitted! " + qty + " units - " + reason + ".");
  resetStaff();
}

</script>
</body>
</html>
